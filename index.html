<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemisa's Café</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Georgia, serif;
}

body{
    background:#d9d9d9;
}

/* ===== CONTENEDOR ===== */

.contenedor{
    width:100%;
    min-height:100vh;
    background:#f5f1f1;
}

/* ===== HEADER ===== */

header{
    width:100%;
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 45px;
    border-top:8px solid #6d3d2e;
    gap:20px;
    flex-wrap:wrap;
}

/* LOGO */

.logo img{
    width:180px;
}

/* MENU */

nav{
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

nav a{
    text-decoration:none;
    color:#2e1d18;
    font-size:22px;
    transition:.3s;
}

nav a:hover{
    color:#d48a46;
}

/* ===== BUSCADOR ===== */

.buscador{
    display:flex;
    align-items:center;
    background:#f3f3f3;
    border-radius:30px;
    overflow:hidden;
    border:2px solid #6d3d2e;
}

.buscador input{
    border:none;
    outline:none;
    padding:10px 15px;
    font-size:16px;
    width:180px;
    background:transparent;
}

.buscador button{
    border:none;
    background:#6d3d2e;
    color:white;
    padding:10px 16px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

.buscador button:hover{
    background:#d48a46;
}

/* ===== BANNER VIDEO ===== */

.banner{
    width:100%;
    height:520px;
    overflow:hidden;
    position:relative;
}

/* VIDEO */

.banner video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ===== CARRUSEL ===== */

.carrusel-section{
    width:100%;
    background:#6d3d2e;
    padding:50px 20px;
    text-align:center;
}

.carrusel-section h2{
    color:white;
    font-size:48px;
    margin-bottom:40px;
}

/* CONTENEDOR */

.carrusel{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    flex-wrap:wrap;
}

/* TARJETAS */

.card{
    width:240px;
    height:330px;
    background:white;
    border-radius:35px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* LINKS */

.carrusel a{
    text-decoration:none;
}

/* FLECHAS */

.flecha{
    color:white;
    font-size:70px;
    cursor:pointer;
    text-decoration:none;
    transition:.3s;
}

.flecha:hover{
    transform:scale(1.2);
    color:#d88a44;
}

/* ===== ELEGIRNOS ===== */

.elegirnos{
    width:100%;
    background:#f5f1f1;
    padding:70px 60px;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* TEXTO */

.texto{
    width:700px;
    z-index:2;
}

.texto h2{
    font-size:58px;
    font-style:italic;
    color:#2e1d18;
    margin-bottom:20px;
}

.texto p{
    font-size:31px;
    line-height:1.6;
    color:#3a2b26;
}

/* GRANOS */

.granos{
    position:absolute;
    left:0;
    top:0;
    width:330px;
    height:430px;
    opacity:.9;
}

/* TAZA */

.taza{
    position:absolute;
    right:10px;
    bottom:0;
    width:320px;
}

/* ===== FOOTER ===== */

footer{
    width:100%;
    background:#d88a44;
    padding:28px;
    border-top:12px solid #6d3d2e;

    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap:wrap;
}

/* ICONOS */

.icono img{
    width:85px;
    transition:.3s;
}

.icono img:hover{
    transform:scale(1.1);
}

/* ===== RESPONSIVE ===== */

@media(max-width:1000px){

    header{
        flex-direction:column;
        text-align:center;
    }

    nav{
        justify-content:center;
    }

    .texto{
        width:100%;
        text-align:center;
    }

    .texto h2{
        font-size:45px;
    }

    .texto p{
        font-size:24px;
    }

    .granos,
    .taza{
        opacity:.2;
    }
}

@media(max-width:768px){

    .logo img{
        width:140px;
    }

    nav{
        flex-direction:column;
        gap:12px;
    }

    nav a{
        font-size:20px;
    }

    .buscador{
        width:100%;
        max-width:320px;
    }

    .buscador input{
        width:100%;
    }

    .banner{
        height:300px;
    }

    .carrusel-section h2{
        font-size:35px;
    }

    .card{
        width:180px;
        height:250px;
    }

    .flecha{
        font-size:50px;
    }

    .elegirnos{
        padding:50px 25px;
    }

    .texto h2{
        font-size:35px;
    }

    .texto p{
        font-size:20px;
    }

    .icono img{
        width:60px;
    }
}

@media(max-width:480px){

    header{
        padding:15px 20px;
    }

    .banner{
        height:220px;
    }

    .card{
        width:150px;
        height:210px;
    }

    .texto h2{
        font-size:28px;
    }

    .texto p{
        font-size:18px;
    }

    .flecha{
        font-size:40px;
    }

    footer{
        gap:25px;
    }
}

</style>
</head>

<body>

<div class="contenedor">

    <!-- ===== HEADER ===== -->

    <header>

        <!-- LOGO -->
        <div class="logo">

            <img src="Logotipo artemisa.png" alt="Logo Artemisa">

        </div>

        <!-- MENU -->
        <nav>

            <a href="index.html">Inicio</a>
            <a href="bebidasfrias.html">Menú</a>
            <a href="nosotros.html">Nosotros</a>
            <a href="contacto.html">Contacto</a>

        </nav>

        <!-- BUSCADOR FUNCIONAL -->
        <div class="buscador">

            <input 
            type="text" 
            id="busqueda" 
            placeholder="Buscar...">

            <button onclick="buscarPagina()">⌕</button>

        </div>

    </header>

    <!-- ===== BANNER VIDEO ===== -->

    <section class="banner">

        <video autoplay muted loop playsinline>

            <source src="banner-video.mp4" type="video/mp4">

        </video>

    </section>

    <!-- ===== CARRUSEL ===== -->

    <section class="carrusel-section">

        <h2>Lo más vendido</h2>

        <div class="carrusel">

            <!-- FLECHA IZQUIERDA -->
            <a href="bebidasfrias.html" class="flecha">◀</a>

            <!-- PRODUCTO 1 -->
            <a href="bebidasfrias.html">

                <div class="card">

                    <img src="producto1.jpg" alt="">

                </div>

            </a>

            <!-- PRODUCTO 2 -->
            <a href="menu.html">

                <div class="card">

                    <img src="producto2.jpg" alt="">

                </div>

            </a>

            <!-- PRODUCTO 3 -->
            <a href="bebidasfrias.html">

                <div class="card">

                    <img src="producto3.jpg" alt="">

                </div>

            </a>

            <!-- FLECHA DERECHA -->
            <a href="bebidasfrias.html" class="flecha">▶</a>

        </div>

    </section>

    <!-- ===== ELEGIRNOS ===== -->

    <section class="elegirnos">

        <img src="granos.png" class="granos">

        <div class="texto">

            <h2>¿Por qué elegirnos?</h2>

            <p>
                Artemisa’s es una cafetería acogedora que ofrece
                café de calidad y un ambiente tranquilo.
                Es el lugar ideal para relajarte, convivir con amigos
                o disfrutar un momento especial.
            </p>

        </div>

        <img src="taza.png" class="taza">

    </section>

    <!-- ===== FOOTER ===== -->

    <footer>

        <a href="https://www.facebook.com/people/Artemisas-by-Los-%C3%A1lamos-caf%C3%A9/61569433284523/" class="icono">

            <img src="facebook.png" alt="">

        </a>

        <a href="https://www.instagram.com/artemisasbylosalamoscafe/" class="icono">

            <img src="instagram.png" alt="">

        </a>

        <a href="https://wa.me/526471141314" class="icono">

            <img src="whatsapp.png" alt="">

        </a>

        <a href="https://www.tiktok.com/@artemisasbylosalamoscafe?_r=1&_t=ZS-964590jpysP" class="icono">

            <img src="tiktok.png" alt="">

        </a>

    </footer>

</div>

<!-- ===== JAVASCRIPT BUSCADOR ===== -->

<script>

function buscarPagina(){

    let texto = document.getElementById("busqueda").value.toLowerCase();

    if(texto.includes("inicio")){
        window.location.href = "index.html";
    }

    else if(texto.includes("menu") || texto.includes("bebidas")){
        window.location.href = "bebidasfrias.html";
    }

    else if(texto.includes("nosotros")){
        window.location.href = "nosotros.html";
    }

    else if(texto.includes("contacto")){
        window.location.href = "contacto.html";
    }

    else{
        alert("No se encontró la página");
    }
}

/* ENTER */

document.getElementById("busqueda").addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        buscarPagina();
    }

});

</script>

</body>
</html>
